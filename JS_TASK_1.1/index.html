<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tile-game</title>
    <style>
      body {
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      #score {
        height: 10vh;
      }
      #game{
        height: 90vh;
        width: 100%;
      }
      table {
        font-family: Arial, sans-serif;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 90%;
        overflow: hidden;
        border: 2px solid none;
        border-collapse: collapse;
      }
      td {
        border: 1px solid seashell;
        border-radius: 25px;
        text-align: center;
        height: inherit;
        width: inherit;
      }
    </style>
  </head>
  <body>
    <h2 id="score">score</h2>
    <div id="game"><table id="table_area"></table></div>
  </body>
  <script src="script.js"></script>
</html>
