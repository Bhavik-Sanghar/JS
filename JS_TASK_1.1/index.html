<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tile-game</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body {
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      /* fixed score bar height so game area can use remaining viewport */
      #score {
        height: 48px;
        line-height: 48px;
        margin: 0;
        padding: 0 12px;
        box-sizing: border-box;
      }
      /* game area is a centered square that fits the viewport without scrolling */
      #game{
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: calc(100vh - 48px);
      }
      /* the grid itself fills the square game area and stays within viewport */
      #table_area {
        display: grid;
        width: inherit; /* use the smaller viewport dimension */
        height: 90vmin;
        max-width: 100%;
        max-height: calc(100vh - 48px);
        box-sizing: border-box;
        background-color: #f4f4f9;
        border: 2px solid #333;
        overflow: hidden;
      }
      /* grid cells: remove default table spacing and make each cell a square block */
      #table_area td {
        display: block;
        box-sizing: border-box;
        border: 1px solid #ddd;
        padding: 0;
        margin: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <h2 id="score">score</h2>
    <div id="game"><table id="table_area"></table></div>
  </body>
  <script src="script.js"></script>
</html>
